passThrough:
- function:
    package: encoding/base32
    name: NewDecoder
    receiver: false
  copy:
  - from: arg(1)
    to: result
- function:
    package: encoding/base32
    type: Encoding
    name: Decode
    receiver: true
  copy:
  - from: arg(1)
    to: arg(0)
- function:
    package: encoding/base32
    type: Encoding
    name: DecodeString
    receiver: true
  copy:
  - from: arg(0)
    to: result(0)
