passThrough:
- function:
    package: database/sql/driver
    type: Conn
    name: Prepare
    receiver: true
  copy:
  - from: arg(0)
    to: result(0)
- function:
    package: database/sql/driver
    type: ConnPrepareContext
    name: PrepareContext
    receiver: true
  copy:
  - from: arg(1)
    to: result(0)
- function:
    package: database/sql/driver
    type: Rows
    name: Next
    receiver: true
  copy:
  - from: this
    to: arg(0)
- function:
    package: database/sql/driver
    type: ValueConverter
    name: ConvertValue
    receiver: true
  copy:
  - from: arg(0)
    to: result(0)
- function:
    package: database/sql/driver
    type: Valuer
    name: Value
    receiver: true
  copy:
  - from: this
    to: result(0)
