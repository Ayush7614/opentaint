rules:
  - id: ellipsis-source-sink
    languages: [go]
    severity: WARNING
    message: "Taint from EllipsisSourceSink.Source reaches EllipsisSourceSink.Sink after intervening statements"
    mode: taint
    pattern-sources:
      - patterns:
          - pattern: "$X = EllipsisSourceSink.Source(...)"
          - focus-metavariable: "$X"
    pattern-sinks:
      - pattern: "EllipsisSourceSink.Sink($X)"
