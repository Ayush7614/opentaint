rules:
  - id: go-reflected-xss
    languages: [go]
    severity: ERROR
    message: Tainted user input written to HTTP response body (reflected XSS)
    mode: taint
    pattern-sources:
      - pattern-either:
          - pattern: $C.GetString($K)
    pattern-sinks:
      - pattern-either:
          - pattern: $W.Write($BUF)
          - pattern: $O.Body($X)
