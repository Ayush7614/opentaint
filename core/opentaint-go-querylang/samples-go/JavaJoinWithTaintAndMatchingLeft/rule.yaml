rules:
  - id: java-join-with-taint-and-matching-left
    languages: [go]
    severity: ERROR
    message: match example/JoinWithTaintAndMatchingLeft (Go port, recast as taint chain)
    mode: taint
    pattern-sources:
      - patterns:
          - pattern: "$X = JavaJoinWithTaintAndMatchingLeft.GetUntrustedInput()"
          - focus-metavariable: "$X"
    pattern-propagators:
      - pattern: "$Y = JavaJoinWithTaintAndMatchingLeft.ProcessInput($X)"
        from: "$X"
        to: "$Y"
      - pattern: "$Y = JavaJoinWithTaintAndMatchingLeft.TransformData($X)"
        from: "$X"
        to: "$Y"
    pattern-sinks:
      - pattern: "JavaJoinWithTaintAndMatchingLeft.ExecuteDangerous($X)"
