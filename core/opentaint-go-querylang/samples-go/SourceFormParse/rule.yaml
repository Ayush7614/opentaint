rules:
  - id: source-form-parse
    languages: [go]
    severity: WARNING
    message: "Taint from r.Form reaches Sink"
    mode: taint
    pattern-sources:
      - pattern: "$R.Form.Get($K)"
      - pattern: "$R.Form"
      - pattern: "$R.Form[$KEY][$IDX]"
    pattern-sinks:
      - pattern: "SourceFormParse.Sink($X)"
