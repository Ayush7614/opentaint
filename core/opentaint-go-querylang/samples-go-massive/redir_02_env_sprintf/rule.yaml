rules:
  - id: redir-02-env-sprintf
    languages: [go]
    severity: WARNING
    message: Tainted env formatted into http.Redirect URL (open redirect)
    mode: taint
    pattern-sources:
      - pattern: os.Getenv("FRONTEND_HOST")
    pattern-sinks:
      - patterns:
          - pattern: http.Redirect($W, $R, $URL, $CODE)
          - focus-metavariable: $URL
