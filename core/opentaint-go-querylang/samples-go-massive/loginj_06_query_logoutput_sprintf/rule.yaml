rules:
  - id: loginj-06-query-logoutput-sprintf
    languages: [go]
    severity: WARNING
    message: Tainted URL query reaches log.Output $MSG via Sprintf (log injection)
    mode: taint
    pattern-sources:
      - pattern: $R.URL.Query().Get($K)
    pattern-sinks:
      - patterns:
          - pattern: $L.Output($DEPTH, $MSG)
          - focus-metavariable: $MSG
