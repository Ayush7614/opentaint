rules:
  - id: cmdinj-15-header-sanitizer
    languages: [go]
    severity: WARNING
    message: Tainted header reaches exec.Command unless sanitized (command injection)
    mode: taint
    pattern-sources:
      - pattern: $R.Header.Get($K)
    pattern-sinks:
      - pattern: cmdinj_15_header_sanitizer.Sink_ExecCommand($X)
    pattern-sanitizers:
      - pattern: strings.ReplaceAll($V, ";", "")
