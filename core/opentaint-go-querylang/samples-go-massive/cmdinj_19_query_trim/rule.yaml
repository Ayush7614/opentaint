rules:
  - id: cmdinj-19-query-trim
    languages: [go]
    severity: WARNING
    message: Tainted URL query trimmed reaches bash -c (command injection)
    mode: taint
    pattern-sources:
      - pattern: $R.URL.Query().Get($K)
    pattern-sinks:
      - pattern: cmdinj_19_query_trim.Sink_ExecBash($X)
