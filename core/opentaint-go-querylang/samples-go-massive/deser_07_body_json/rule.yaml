rules:
  - id: deser-07-body-json
    languages: [go]
    severity: WARNING
    message: Request body bytes reach json.Unmarshal (deserialization)
    mode: taint
    pattern-sources:
      - pattern: $UNTRUSTED, _ = ioutil.ReadAll($R.Body)
    pattern-sinks:
      - pattern: json.Unmarshal($DATA, $TARGET)
