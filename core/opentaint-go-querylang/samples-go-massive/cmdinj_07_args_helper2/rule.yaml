rules:
  - id: cmdinj-07-args-helper2
    languages: [go]
    severity: WARNING
    message: Tainted os.Args via two-hop helper reaches exec.Command (command injection)
    mode: taint
    pattern-sources:
      - pattern: os.Args[$IDX]
    pattern-sinks:
      - pattern: cmdinj_07_args_helper2.Sink_ExecCommand($X)
