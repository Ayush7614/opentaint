rules:
  - id: deser-16-merge-sources-json
    languages: [go]
    severity: WARNING
    message: Two tainted sources merge into json.Unmarshal (deserialization)
    mode: taint
    pattern-sources:
      - pattern: os.Getenv($K)
      - pattern: $R.URL.Query().Get($K2)
    pattern-sinks:
      - pattern: json.Unmarshal($DATA, $TARGET)
