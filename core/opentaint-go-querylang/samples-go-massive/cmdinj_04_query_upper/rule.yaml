rules:
  - id: cmdinj-04-query-upper
    languages: [go]
    severity: WARNING
    message: Tainted URL query reaches exec.Command (command injection)
    mode: taint
    pattern-sources:
      - pattern: $R.URL.Query().Get($K)
    pattern-sinks:
      - pattern: cmdinj_04_query_upper.Sink_ExecCommand($X)
