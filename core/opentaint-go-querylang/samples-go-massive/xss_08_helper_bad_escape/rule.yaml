rules:
  - id: xss-08-helper-bad-escape
    languages: [go]
    severity: WARNING
    message: Tainted form value flows through helper chain (bad escape) into w.Write (reflected XSS)
    mode: taint
    pattern-sources:
      - pattern: $R.FormValue($K)
    pattern-sinks:
      - pattern: $W.Write($B)
