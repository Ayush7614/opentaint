rules:
  - id: hdrinj-07-header-redirect-helper
    languages: [go]
    severity: WARNING
    message: Tainted header passes through helper into http.Redirect URL (header injection)
    mode: taint
    pattern-sources:
      - pattern: $R.Header.Get($K)
    pattern-sinks:
      - patterns:
          - pattern: http.Redirect($W, $R, $URL, $CODE)
          - focus-metavariable: $URL
