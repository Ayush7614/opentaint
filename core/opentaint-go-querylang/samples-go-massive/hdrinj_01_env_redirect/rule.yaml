rules:
  - id: hdrinj-01-env-redirect
    languages: [go]
    severity: WARNING
    message: Tainted env reaches http.Redirect URL (header injection via Location)
    mode: taint
    pattern-sources:
      - pattern: os.Getenv("NEXT_URL")
    pattern-sinks:
      - patterns:
          - pattern: http.Redirect($W, $R, $URL, $CODE)
          - focus-metavariable: $URL
