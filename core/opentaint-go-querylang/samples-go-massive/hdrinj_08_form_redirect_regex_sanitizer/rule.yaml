rules:
  - id: hdrinj-08-form-redirect-regex-sanitizer
    languages: [go]
    severity: WARNING
    message: Tainted FormValue reaches http.Redirect URL unless regex-allowlisted (header injection)
    mode: taint
    pattern-sources:
      - pattern: $R.FormValue($K)
    pattern-sinks:
      - patterns:
          - pattern: http.Redirect($W, $R, $URL, $CODE)
          - focus-metavariable: $URL
    pattern-sanitizers:
      - pattern: regexp.MustCompile($P).ReplaceAllString($V, $R2)
