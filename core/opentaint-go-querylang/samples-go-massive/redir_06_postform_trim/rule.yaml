rules:
  - id: redir-06-postform-trim
    languages: [go]
    severity: WARNING
    message: Tainted PostFormValue trimmed into http.Redirect URL (open redirect)
    mode: taint
    pattern-sources:
      - pattern: $R.PostFormValue($K)
    pattern-sinks:
      - patterns:
          - pattern: http.Redirect($W, $R, $URL, $CODE)
          - focus-metavariable: $URL
