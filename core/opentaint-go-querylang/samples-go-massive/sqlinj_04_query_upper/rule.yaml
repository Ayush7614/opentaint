rules:
  - id: sqlinj-04-query-upper
    languages: [go]
    severity: WARNING
    message: Tainted URL query reaches db.QueryRow (SQL injection)
    mode: taint
    pattern-sources:
      - pattern: $R.URL.Query().Get($K)
    pattern-sinks:
      - pattern: sqlinj_04_query_upper.Sink_DbQueryRow($X)
