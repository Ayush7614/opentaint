rules:
  - id: hdrinj-04-form-redirect-sprintf
    languages: [go]
    severity: WARNING
    message: Tainted FormValue formatted into http.Redirect URL (header injection)
    mode: taint
    pattern-sources:
      - pattern: $R.FormValue($K)
    pattern-sinks:
      - patterns:
          - pattern: http.Redirect($W, $R, $URL, $CODE)
          - focus-metavariable: $URL
