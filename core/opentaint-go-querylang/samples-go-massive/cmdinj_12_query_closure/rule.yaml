rules:
  - id: cmdinj-12-query-closure
    languages: [go]
    severity: WARNING
    message: Tainted URL query in closure reaches bash -c (command injection)
    mode: taint
    pattern-sources:
      - pattern: $R.URL.Query().Get($K)
    pattern-sinks:
      - pattern: cmdinj_12_query_closure.Sink_ExecBash($X)
