rules:
  - id: deser-13-closure-json
    languages: [go]
    severity: WARNING
    message: Tainted query captured by closure reaches json.Unmarshal (deserialization)
    mode: taint
    pattern-sources:
      - pattern: $R.URL.Query().Get($K)
    pattern-sinks:
      - pattern: json.Unmarshal($DATA, $TARGET)
