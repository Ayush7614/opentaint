rules:
  - id: redir-04-query-concat
    languages: [go]
    severity: WARNING
    message: Tainted URL query concatenated into http.Redirect URL (open redirect)
    mode: taint
    pattern-sources:
      - pattern: $R.URL.Query().Get($K)
    pattern-sinks:
      - patterns:
          - pattern: http.Redirect($W, $R, $URL, $CODE)
          - focus-metavariable: $URL
