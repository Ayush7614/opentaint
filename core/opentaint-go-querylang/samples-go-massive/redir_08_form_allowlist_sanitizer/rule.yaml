rules:
  - id: redir-08-form-allowlist-sanitizer
    languages: [go]
    severity: WARNING
    message: Tainted FormValue reaches http.Redirect URL unless allowlisted (open redirect)
    mode: taint
    pattern-sources:
      - pattern: $R.FormValue($K)
    pattern-sinks:
      - patterns:
          - pattern: http.Redirect($W, $R, $URL, $CODE)
          - focus-metavariable: $URL
    pattern-sanitizers:
      - pattern: isAllowedRedirect($V)
