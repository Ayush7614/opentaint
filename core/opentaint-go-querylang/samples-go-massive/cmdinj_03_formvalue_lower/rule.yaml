rules:
  - id: cmdinj-03-formvalue-lower
    languages: [go]
    severity: WARNING
    message: Tainted FormValue reaches bash -c (command injection)
    mode: taint
    pattern-sources:
      - pattern: $R.FormValue($K)
    pattern-sinks:
      - pattern: cmdinj_03_formvalue_lower.Sink_ExecBash($X)
