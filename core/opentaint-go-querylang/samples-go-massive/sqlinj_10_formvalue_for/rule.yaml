rules:
  - id: sqlinj-10-formvalue-for
    languages: [go]
    severity: WARNING
    message: Tainted FormValue in loop reaches db.Query (SQL injection)
    mode: taint
    pattern-sources:
      - pattern: $R.FormValue($K)
    pattern-sinks:
      - pattern: sqlinj_10_formvalue_for.Sink_DbQuery($X)
